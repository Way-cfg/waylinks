<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Way — building digital presence" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" href="assets/logo.png" />
  <title>Way</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-layer" style="--i: 1"></div>
  <div class="bg-layer" style="--i: 2"></div>
  <div class="bg-layer" style="--i: 3"></div>
  <div class="bg-layer" style="--i: 4"></div>
  <div class="bg-layer" style="--i: 5"></div>
  <div class="bg-grid"></div>
  <div class="mouse-glow" id="mouseGlow"></div>

  <main class="container">
    <header class="header">
      <div class="logo-wrapper">
        <img src="assets/logo.png" alt="Way" class="brand-logo" />
      </div>
      <h1 class="wordmark">way</h1>
      <p class="tagline">building digital presence</p>
    </header>

    <nav class="links">
      <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="link-card" style="animation-delay: 1.2s">
        <span class="card-shimmer"></span>
        <span class="link-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <rect x="2" y="4" width="20" height="16" rx="4" />
  <polygon points="10,8 16,12 10,16" fill="currentColor" />
</svg></span>
        <span class="link-label">YouTube</span>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://twitch.tv" target="_blank" rel="noopener noreferrer" class="link-card" style="animation-delay: 1.4s">
        <span class="card-shimmer"></span>
        <span class="link-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <path d="M21 2H3v16h5v4l4-4h5l4-4V2z" />
  <line x1="11" y1="7" x2="11" y2="11" />
  <line x1="17" y1="7" x2="17" y2="11" />
</svg></span>
        <span class="link-label">Twitch</span>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="link-card" style="animation-delay: 1.6s">
        <span class="card-shimmer"></span>
        <span class="link-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.167 6.84 9.5.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.15-1.11-1.46-1.11-1.46-.91-.62.07-.61.07-.61 1.01.07 1.54 1.03 1.54 1.03.9 1.54 2.36 1.1 2.94.84.09-.66.35-1.1.63-1.35-2.22-.25-4.56-1.11-4.56-4.94 0-1.1.39-2 1.03-2.7-.1-.26-.45-1.28.1-2.66 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33s1.7.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.66.64.7 1.03 1.6 1.03 2.7 0 3.84-2.34 4.69-4.57 4.94.36.31.68.93.68 1.88v2.78c0 .27.18.58.69.48A10.01 10.01 0 0 0 22 12c0-5.523-4.477-10-10-10z" />
</svg></span>
        <span class="link-label">GitHub</span>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://kick.com" target="_blank" rel="noopener noreferrer" class="link-card" style="animation-delay: 1.8s">
        <span class="card-shimmer"></span>
        <span class="link-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <rect x="2" y="2" width="20" height="20" rx="5" />
  <polygon points="10,7 16,12 10,17" fill="currentColor" />
</svg></span>
        <span class="link-label">Kick</span>
        <span class="link-arrow">→</span>
      </a>
    </nav>

    <footer class="footer" style="animation-delay: 2s">
      <p>&copy; Way</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
